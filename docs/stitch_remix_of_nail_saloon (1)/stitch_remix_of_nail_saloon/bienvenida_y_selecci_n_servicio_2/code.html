<!DOCTYPE html>

                    borderRadius: {
                        "DEFAULT": "0.25rem",

                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .serif-title {
            font-family: 'Cormorant Garamond', serif;

        input::placeholder {

        }
        input:focus {

        }

    body {

<body class="bg-background-cream min-h-screen text-dark-text antialiased">
<nav class="sticky top-0 z-50 flex items-center justify-between px-6 py-4 bg-background-cream/80 backdrop-blur-md">

</button>
<span class="text-[10px] font-bold tracking-[0.2em] uppercase opacity-40 serif-title">Registro</span>
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-accent-pink/20 transition-colors">
<span class="material-symbols-outlined text-dark-text font-light">close</span>
</button>
</nav>
<main class="max-w-md mx-auto px-6 pb-40">
<header class="flex flex-col items-center mt-6 mb-12">
<div class="relative">
<div class="absolute inset-0 bg-accent-pink/20 rounded-full blur-2xl"></div>
<div class="relative w-32 h-32 rounded-full border-[0.5px] border-accent-pink p-1 bg-white shadow-sm overflow-hidden">
<img alt="Ana - Manicurista Profesional" class="w-full h-full object-cover rounded-full" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDPHc1kT2oN0rg91G0hfUBphzQeFsuglpu_OhBuG5XhZlUBamDkYR1ZnL-jAvohm8sk-UB5O51jObj6wAeEpjN6qOrCQzoKJ3OcMjjKBwPCuMX5bc36q_LJxzk0gU-WDjPDRy89RFwSZJ5qtBAOvkf0sl7jpXLOjVKTVVSnkjtYkGzs5RBQspS2MyS3mCdBLqGhn9zn-A_7VWnKslHXJpP7vlS3vKEk8mCuE4p2SoVA1nuJxqOzEKMTL_-G9zz5IMjsYRkirkQthfo0"/>
</div>
</div>
<div class="mt-6 text-center">
<h1 class="text-4xl font-medium serif-title text-dark-text">¡Hola! Soy Ana</h1>
<p class="text-dark-text/50 mt-2 text-xs tracking-[0.15em] uppercase font-light">Para comenzar, necesito tus datos</p>
</div>
</header>
<section class="space-y-8">
<div class="text-center mb-4">
<h2 class="text-2xl serif-title text-dark-text italic">Datos personales</h2>
<div class="w-8 h-[1px] bg-accent-pink mx-auto mt-2"></div>
</div>
<form class="space-y-6">
<div class="space-y-1.5">
<label class="text-[11px] uppercase tracking-widest text-dark-text/40 ml-4 font-medium">Nombre completo</label>
<input class="w-full bg-white/60 border-transparent rounded-2xl py-4 px-6 text-dark-text serif-title text-lg transition-all focus:bg-white border-[1px] placeholder:opacity-50" placeholder="Ej. Maria Garcia" type="text"/>
</div>
<div class="space-y-1.5">
<label class="text-[11px] uppercase tracking-widest text-dark-text/40 ml-4 font-medium">WhatsApp</label>
<input class="w-full bg-white/60 border-transparent rounded-2xl py-4 px-6 text-dark-text serif-title text-lg transition-all focus:bg-white border-[1px] placeholder:opacity-50" placeholder="+34 000 000 000" type="tel"/>
</div>
<div class="space-y-1.5">
<label class="text-[11px] uppercase tracking-widest text-dark-text/40 ml-4 font-medium">Correo electrónico</label>
<input class="w-full bg-white/60 border-transparent rounded-2xl py-4 px-6 text-dark-text serif-title text-lg transition-all focus:bg-white border-[1px] placeholder:opacity-50" placeholder="hola@ejemplo.com" type="email"/>
</div>
</form>
</section>
</main>
<div class="fixed bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-background-cream via-background-cream to-transparent pt-16 pointer-events-none">
<div class="max-w-md mx-auto pointer-events-auto">
<button class="w-full bg-accent-pink hover:bg-[#E2C4C4] text-dark-text font-medium py-4 rounded-2xl shadow-sm active:scale-[0.98] transition-all flex items-center justify-center gap-3">
<span class="serif-title text-xl tracking-wide">Siguiente</span>
<span class="material-symbols-outlined font-light text-xl">arrow_right_alt</span>
</button>
<p class="text-[10px] text-center mt-4 text-dark-text/30 uppercase tracking-widest">Tus datos están seguros conmigo</p>
