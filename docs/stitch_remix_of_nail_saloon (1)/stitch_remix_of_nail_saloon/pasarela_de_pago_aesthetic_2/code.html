<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Pasarela de Pago Aesthetic Refinada</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600&amp;family=Noto+Serif:ital,wght@0,300;0,400;0,700;1,400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#E2B6B1","background-light": "#F9F6F2","background-dark": "#211a1a",
                    },
                    fontFamily: {
                        "display": ["Noto Serif", "serif"],
                        "sans": ["Noto Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Noto Sans', sans-serif;
            background-color: #F9F6F2;
        }
        .font-display {
            font-family: 'Noto Serif', serif;
        }
        input::placeholder {
            color: #D1D5DB !important;font-style: italic;
            opacity: 0.6;
        }
        .soft-shadow {
            shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.02);
        }
    </style>

    body {

<body class="bg-background-light dark:bg-background-dark text-slate-800 dark:text-slate-200 min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col bg-background-light dark:bg-background-dark shadow-sm">
<header class="flex items-center justify-between p-6">
<button class="text-slate-400 hover:text-slate-600 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
<h1 class="font-display italic text-xl tracking-tight text-slate-700 dark:text-slate-300">Pago Seguro</h1>
<div class="w-6"></div> 
</header>
<main class="flex-1 px-8 pb-12">
<section class="text-center mt-6 mb-12">
<p class="text-slate-400 dark:text-slate-500 text-[10px] uppercase tracking-[0.3em] mb-4">Reserva de Manicura</p>
<h2 class="font-display text-5xl font-light text-slate-800 dark:text-slate-100 mb-2">
                $45.00
            </h2>
<p class="text-slate-400 dark:text-slate-500 font-display italic text-sm">Anticipo del servicio</p>
</section>
<section class="mb-10">
<h3 class="text-[9px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-[0.2em] mb-5 px-1">Método de pago</h3>
<div class="grid grid-cols-3 gap-4">
<button class="flex flex-col items-center justify-center py-5 rounded-2xl border-2 border-primary bg-white dark:bg-slate-800/40 shadow-[0_4px_12px_rgba(226,182,177,0.1)] transition-all">
<span class="material-symbols-outlined text-primary mb-2">credit_card</span>
<span class="text-[9px] font-bold text-slate-600 dark:text-slate-300 tracking-wider">TARJETA</span>
</button>
<button class="flex flex-col items-center justify-center py-5 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white/40 dark:bg-slate-900/10 hover:border-primary/40 transition-all">
<span class="material-symbols-outlined text-slate-300 mb-2">contactless</span>
<span class="text-[9px] font-bold text-slate-400 tracking-wider">APPLE PAY</span>
</button>
<button class="flex flex-col items-center justify-center py-5 rounded-2xl border border-slate-200 dark:border-slate-800 bg-white/40 dark:bg-slate-900/10 hover:border-primary/40 transition-all">
<span class="material-symbols-outlined text-slate-300 mb-2">wallet</span>
<span class="text-[9px] font-bold text-slate-400 tracking-wider">MERCADO</span>
</button>
</div>
</section>
<section class="space-y-8">
<div class="relative group">
<label class="block text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-1 ml-1">Nombre en la tarjeta</label>
<input class="w-full bg-transparent border-0 border-b border-slate-200 dark:border-slate-800 py-2 px-1 focus:ring-0 focus:border-primary outline-none text-sm font-display text-slate-700 dark:text-slate-200 transition-colors" placeholder="Nombre y Apellido" type="text"/>
</div>
<div class="relative group">
<label class="block text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-1 ml-1">Número de tarjeta</label>
<div class="flex items-center border-b border-slate-200 dark:border-slate-800 py-2 px-1 group-focus-within:border-primary transition-colors">
<input class="w-full bg-transparent focus:ring-0 outline-none text-sm font-display tracking-[0.2em] border-none p-0 text-slate-700 dark:text-slate-200" placeholder="0000 0000 0000 0000" type="text"/>
<span class="material-symbols-outlined text-slate-200 text-lg">credit_card</span>
</div>
</div>
<div class="flex gap-10">
<div class="relative group flex-1">
<label class="block text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-1 ml-1">Vencimiento</label>
<input class="w-full bg-transparent border-0 border-b border-slate-200 dark:border-slate-800 py-2 px-1 focus:ring-0 focus:border-primary outline-none text-sm font-display text-slate-700 dark:text-slate-200 transition-colors" placeholder="MM / AA" type="text"/>
</div>
<div class="relative group flex-1">
<label class="block text-[10px] font-semibold text-slate-400 uppercase tracking-widest mb-1 ml-1">CVC</label>
<input class="w-full bg-transparent border-0 border-b border-slate-200 dark:border-slate-800 py-2 px-1 focus:ring-0 focus:border-primary outline-none text-sm font-display text-slate-700 dark:text-slate-200 transition-colors" placeholder="123" type="text"/>
</div>
</div>
</section>
<button class="w-full mt-14 bg-primary text-white py-4 rounded-full flex items-center justify-center gap-3 shadow-[0_2px_10px_rgba(226,182,177,0.3)] hover:brightness-105 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-base">lock</span>
<span class="font-display font-medium tracking-wide">Confirmar Pago Seguro</span>
</button>
</main>
<footer class="p-10 flex flex-col items-center">
<p class="text-[9px] text-slate-300 dark:text-slate-600 uppercase tracking-[0.25em] mb-6">Protección SSL de Grado Bancario</p>
<div class="flex items-center gap-8 opacity-30 grayscale hover:opacity-50 transition-opacity">

</div>
