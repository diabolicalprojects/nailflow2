version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nailflow
      POSTGRES_USER: nailflow
      POSTGRES_PASSWORD: nailflow_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U nailflow' ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://nailflow:nailflow_pass@postgres:5432/nailflow
      FRONTEND_URL: http://localhost:3000
      CDN_API_KEY: dmm_7tpONlAMTNtIMLjpr4gMSNqw9LGbgX6X
      CDN_API_KEY_REFERENCES: dmm_XKnnaMPrgRWaRHQ21deaQ3Krz2B6iBW
      PAYMENT_TEST_MODE: 'true'
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_CDN_KEY: dmm_7tpONlAMTNtIMLjpr4gMSNqw9LGbgX6X
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
